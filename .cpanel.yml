---
# cPanel Git Version Control deployment.
# Runs every time you click "Deploy HEAD Commit" in cPanel. The working directory
# is this repository's clone path (the app folder, OUTSIDE public_html).
#
# What it does:
#   1. Publishes the prebuilt public/ folder into the live web root (public_html).
#   2. Installs a front controller (public_html/index.php) that points back here.
#   3. Installs PHP deps (only if Composer exists on the host).
#   4. Generates APP_KEY (once), runs migrations + seed, and caches config —
#      but ONLY after you've created .env in this folder. Until then these steps
#      are skipped automatically, so the first deploy won't error.
deployment:
  tasks:
    # --- Publish the front-end into the web root ---------------------------------
    - /bin/rm -f "$HOME/public_html/index.html" "$HOME/public_html/index.htm" "$HOME/public_html/default.html" 2>/dev/null || true
    - /bin/rm -rf "$HOME/public_html/build"
    - /bin/cp -R "$(pwd)/public/." "$HOME/public_html/"
    - /bin/sed "s#__APP_BASE__#$(pwd)#g" "$(pwd)/deploy/index.php" > "$HOME/public_html/index.php"

    # --- Install PHP deps + app setup -------------------------------------------
    #     Self-contained: resolves a PHP 8.3+ CLI, bootstraps Composer when the
    #     host doesn't ship it (this is why the first deploy 500'd — no vendor/),
    #     installs vendor, then keys/migrates/caches once .env exists. Idempotent,
    #     so it's safe to re-run on every Deploy HEAD Commit.
    - |
      APP="$(pwd)"
      cd "$APP" || exit 0
      PHP=""
      for c in /opt/alt/php83/usr/bin/php /opt/cpanel/ea-php83/root/usr/bin/php php83 ea-php83 php; do
        if [ -x "$c" ] || command -v "$c" >/dev/null 2>&1; then PHP="$c"; break; fi
      done
      echo "Deploy PHP: $PHP"; "$PHP" -v 2>/dev/null | head -1
      # Install vendor/ if it's missing
      if [ ! -f "$APP/vendor/autoload.php" ]; then
        if command -v composer >/dev/null 2>&1; then
          composer install --no-dev --optimize-autoloader --no-interaction --no-scripts
        else
          # Keep composer.phar OUTSIDE the repo so the deploy never dirties the
          # working tree (a dirty tree greys out cPanel's Deploy button).
          CPHAR="$HOME/composer.phar"
          if [ ! -f "$CPHAR" ]; then
            if command -v curl >/dev/null 2>&1; then
              curl -sS https://getcomposer.org/download/latest-stable/composer.phar -o "$CPHAR"
            elif command -v wget >/dev/null 2>&1; then
              wget -q https://getcomposer.org/download/latest-stable/composer.phar -O "$CPHAR"
            else
              "$PHP" -r "copy('https://getcomposer.org/installer','$HOME/composer-setup.php');" && "$PHP" "$HOME/composer-setup.php" --quiet --install-dir="$HOME" && rm -f "$HOME/composer-setup.php"
            fi
          fi
          "$PHP" -d memory_limit=-1 "$CPHAR" install --no-dev --optimize-autoloader --no-interaction --no-scripts
        fi
        "$PHP" artisan package:discover --ansi || true
      fi
      # App setup — only once .env exists AND vendor is installed
      if [ -f "$APP/.env" ] && [ -f "$APP/vendor/autoload.php" ]; then
        grep -q '^APP_KEY=base64:' "$APP/.env" || "$PHP" artisan key:generate --force
        "$PHP" artisan migrate --force --seed || true
        "$PHP" artisan config:cache && "$PHP" artisan route:cache && "$PHP" artisan view:cache
      fi
      # Writable runtime directories
      chmod -R 775 "$APP/storage" "$APP/bootstrap/cache" 2>/dev/null || true
